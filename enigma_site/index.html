<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Universo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Fundo e Texto */
        body { 
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%); 
            color: white; 
            font-family: monospace; 
            margin: 0; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        .navbar { box-shadow: 0 0 15px #8a2be2; border-bottom: 1px solid #8a2be2; background: black !important; z-index: 100; }
        .section { display: none; position: relative; z-index: 10; }
        .active { display: block; }

        .wrapper { display: flex; justify-content: center; min-height: 80vh; align-items: center; }
        .content { max-width: 800px; width: 100%; padding: 20px; }

        .card {
            border: 2px solid #8a2be2;
            border-radius: 20px;
            background: rgba(13, 13, 13, 0.9);
            padding: 25px;
            box-shadow: 0 0 20px #8a2be2;
            backdrop-filter: blur(5px);
        }

        h1, h2, h3, p, span, label, .navbar-brand { color: white !important; }

        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #8a2be2;
            color: white !important;
            border-radius: 10px;
            outline: none;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.5) !important; }

        button {
            background: #8a2be2;
            color: white !important;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 15px #8a2be2; }

        /* Estrelas Cadentes */
        #night-sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .shooting-star {
            position: absolute; height: 2px; background: linear-gradient(-45deg, #ffffff, rgba(0, 0, 255, 0));
            border-radius: 999px; filter: drop-shadow(0 0 6px #ffffff);
            animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
        }
        @keyframes tail { 0% { width: 0; } 30% { width: 100px; } 100% { width: 0; } }
        @keyframes shooting { 0% { transform: translateX(0) translateY(0) rotate(45deg); } 100% { transform: translateX(-800px) translateY(800px) rotate(45deg); } }

        #display-segundos { font-size: 3rem; color: #8a2be2 !important; text-shadow: 0 0 10px #8a2be2; margin: 20px 0; display: block; }
        .enigma-step { display: none; }
        .step-active { display: block; }
        .file { border: 1px solid #8a2be2; border-radius: 15px; padding: 15px; margin-top: 15px; background: rgba(17, 17, 17, 0.8); }
    </style>
</head>

<body>

<div id="night-sky"></div>

<audio id="bgmusic" loop>
    <source src="musicafundo.mp3">
</audio>

<nav class="navbar navbar-dark bg-black px-4">
    <div class="container-fluid">
        <span class="navbar-brand">Nosso Universo</span>
        <div class="d-flex gap-2">
            <button onclick="show('home')">Home</button>
            <button onclick="show('cronometro-aba')">Tempo</button>
            <button onclick="show('enigma')">Enigma</button>
            <button onclick="show('album')">Álbum</button>
        </div>
    </div>
</nav>

<div class="wrapper">
    <div class="content">

        <section id="home" class="section active">
            <div class="card text-center">
                <h1>Boas vindas</h1>
                <p>Oii, Duda… seja bem-vinda ao nosso pequeno refúgio mágico...</p>
            </div>
        </section>

        <section id="cronometro-aba" class="section">
            <div class="card text-center">
                <h2>O tempo corre...</h2>
                <p>Segundos exatos desde quando nossos caminhos se cruzaram</p>
                <span id="display-segundos">0</span>
            </div>
        </section>

        <section id="enigma" class="section">
            <div class="card text-center">
                <div id="fase1" class="enigma-step step-active">
                    <p>Txdqgr wxgr frphçrx</p>
                    <input type="text" id="data" placeholder="Data">
                    <input type="text" id="hora" placeholder="Hora">
                    <button onclick="f1()">Confirmar</button>
                </div>

                <div id="fase2" class="enigma-step">
                    <audio controls src="audio.mp3" class="mb-3 w-100"></audio>
                    <input type="text" id="r2" placeholder="Resposta">
                    <button onclick="f2()">Confirmar</button>
                </div>

                <div id="fase3" class="enigma-step">
                    <img src="imagem1.png" width="100%" class="mb-3" style="border-radius:10px">
                    <p>1°2'3"S 4°5'6"W</p>
                    <input type="text" id="r3" placeholder="Resposta">
                    <button onclick="f3()">Confirmar</button>
                </div>

                <div id="fase4" class="enigma-step">
                    <img src="imagem2.png" width="100%" class="mb-3" style="max-width:300px; border-radius: 10px;">
                    <div class="text-start mb-3">
                        <label>A - MLs de água purificada:</label> <input id="a" type="number">
                        <label>B - Gramas de proteínas concentrada:</label> <input id="b" type="number">
                        <label>C - Gramas de Lipidios refinados:</label> <input id="c" type="number">
                        <label>D - Gramas de carboidratos:</label> <input id="d" type="number">
                        <label>E - Gramas de minerais essenciais:</label> <input id="e" type="number">
                    </div>
                    <button onclick="f4()">Confirmar</button>
                </div>

                <div id="final" class="enigma-step">
                    <p>Você chegou até aqui... Foi sobre me encontrar em você.</p>
                </div>
            </div>
        </section>

        <section id="album" class="section">
            <div class="card text-center">
                <h2>Nosso álbum</h2>
                <input type="file" id="fileInput">
                <input id="titulo" placeholder="Título">
                <input type="date" id="dataFoto">
                <button onclick="addItem()">Adicionar</button>
                <div id="lista" class="mt-4"></div>
            </div>
        </section>

    </div>
</div>

<script>
    const bgMusic = document.getElementById('bgmusic');

    // Controle inteligente de áudio
    function setupAudioControl() {
        const allMedia = document.querySelectorAll('audio:not(#bgmusic), video');
        allMedia.forEach(media => {
            media.onplay = () => bgMusic.pause();
            media.onpause = () => bgMusic.play().catch(() => {});
            media.onended = () => bgMusic.play().catch(() => {});
        });
    }
    setInterval(setupAudioControl, 2000);

    window.addEventListener('click', () => {
        bgMusic.volume = 0.3;
        bgMusic.play().catch(() => {});
    }, {once: true});

    // Estrelas cadentes
    function createStar() {
        const sky = document.getElementById('night-sky');
        const star = document.createElement('div');
        star.className = 'shooting-star';
        const x = Math.random() * window.innerWidth;
        const y = Math.random() * window.innerHeight / 2;
        const delay = Math.random() * 5;
        const duration = Math.random() * 2 + 2;
        star.style.left = `${x}px`;
        star.style.top = `${y}px`;
        star.style.animationDelay = `${delay}s`;
        star.style.animationDuration = `${duration}s`;
        sky.appendChild(star);
        setTimeout(() => star.remove(), (delay + duration) * 1000);
    }
    setInterval(createStar, 800);

    function show(id){
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function atualizarCronometro() {
        const dataInicio = new Date("2025-10-08T22:46:00");
        const display = document.getElementById('display-segundos');
        setInterval(() => {
            const agora = new Date();
            const segundos = Math.floor((agora - dataInicio) / 1000);
            if (display) display.innerText = segundos.toLocaleString('pt-BR');
        }, 1000);
    }

    function nextStep(current, next) {
        document.getElementById(current).classList.remove('step-active');
        document.getElementById(next).classList.add('step-active');
    }

    function f1() { if(document.getElementById('data').value === "08/10/2025" && document.getElementById('hora').value === "22:46") nextStep('fase1', 'fase2'); }
    function f2() { if(document.getElementById('r2').value.toLowerCase() === "lagoinha") nextStep('fase2', 'fase3'); }
    function f3() { if(document.getElementById('r3').value.toLowerCase() === "nosso primeiro beijo") nextStep('fase3', 'fase4'); }
    function f4() {
        const v = id => document.getElementById(id).value;
        if(v('a')=="225" && v('b')=="60" && v('c')=="15" && v('d')=="3" && v('e')=="3") nextStep('fase4', 'final');
    }

    function addItem(){
        let file = document.getElementById('fileInput').files[0];
        if(!file) return;
        let reader = new FileReader();
        reader.onload = function(e){
            let data = JSON.parse(localStorage.getItem("album")||"[]");
            data.push({ src: e.target.result, type: file.type, titulo: document.getElementById('titulo').value, data: document.getElementById('dataFoto').value, likes: 0 });
            localStorage.setItem("album", JSON.stringify(data));
            render();
            setupAudioControl();
        };
        reader.readAsDataURL(file);
    }

    function render(){
        let data = JSON.parse(localStorage.getItem("album")||"[]");
        let lista = document.getElementById('lista');
        if(!lista) return;
        lista.innerHTML = "";
        data.forEach((it, i) => {
            let div = document.createElement("div");
            div.className = "file";
            let content = "";
            if(it.type.startsWith("image")) content = `<img src="${it.src}" width="100%">`;
            else if(it.type.startsWith("video")) content = `<video controls width="100%" src="${it.src}"></video>`;
            else if(it.type.startsWith("audio")) content = `<audio controls src="${it.src}" class="w-100"></audio>`;
            div.innerHTML = content + `<p>${it.titulo}</p><button onclick="removeItem(${i})">🗑️</button>`;
            lista.appendChild(div);
        });
    }

    function removeItem(i){
        let data = JSON.parse(localStorage.getItem("album"));
        data.splice(i,1);
        localStorage.setItem("album", JSON.stringify(data));
        render();
    }

    render();
    atualizarCronometro();
    setupAudioControl();
</script>

</body>
</html>
